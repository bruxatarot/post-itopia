<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Post-itopia 🌈✨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#f9c8d8;--yellow:#fff3b8;--blue:#c8e4f8;--lavender:#e2d4f8;
  --mint:#c8f0dc;--peach:#ffd8c0;--cork:#e8d5b0;--cork-dark:#d4bc8e;
  --text:#5a4a6a;--text-soft:#8a7a9a;--radius-note:14px;
  --font:'Nunito',sans-serif;
}
body{font-family:var(--font);background:#fdf0f8;color:var(--text);min-height:100vh;overflow-x:hidden}

/* Header */
.site-header{background:linear-gradient(135deg,#fce4ec 0%,#f3e5f5 40%,#e8eaf6 100%);border-bottom:2px dashed #e0c8e8;padding:1.2rem 2rem 1rem}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:.5rem}
.logo-icon{font-size:2rem}
.logo-text{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#f48fb1,#ce93d8,#90caf9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px}
.tagline{font-size:.95rem;color:var(--text-soft);font-weight:600;flex:1}
.header-actions{display:flex;gap:.7rem;align-items:center}
.btn-hug{background:var(--pink);border:2px solid #f0a8c0;color:#c06090;padding:.5rem 1rem;border-radius:50px;font-family:var(--font);font-weight:700;font-size:.9rem;cursor:pointer;transition:transform .15s,box-shadow .15s;display:flex;align-items:center;gap:.4rem}
.btn-hug:hover{transform:scale(1.06);box-shadow:0 4px 12px rgba(240,168,192,.4)}
.hug-bear{font-size:1.1rem;display:inline-block;animation:wiggle 1.5s ease-in-out infinite}
.btn-new{background:linear-gradient(135deg,#ce93d8,#90caf9);border:none;color:white;padding:.55rem 1.2rem;border-radius:50px;font-family:var(--font);font-weight:800;font-size:.95rem;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 14px rgba(180,130,220,.35)}
.btn-new:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 6px 18px rgba(180,130,220,.45)}

/* Hug overlay */
.hug-overlay{display:none;position:fixed;inset:0;background:rgba(255,220,240,.75);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center}
.hug-overlay.active{display:flex}
.hug-card{background:white;border-radius:28px;padding:2.5rem 3rem;text-align:center;border:3px solid var(--pink);animation:popIn .4s cubic-bezier(.34,1.56,.64,1);position:relative}
.hug-bear-big{font-size:5rem;display:block;margin-bottom:1rem;animation:hug-bounce .7s ease-in-out infinite alternate}
.hug-card p{font-size:1.3rem;font-weight:700;color:#c06090}
.hug-close{position:absolute;top:.8rem;right:1.1rem;font-size:1.5rem;cursor:pointer;color:#d0a0c0;font-weight:700}
.hug-close:hover{color:#c06090}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(200,160,220,.4);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.active{display:flex}
.modal-card{background:white;border-radius:24px;padding:2rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;position:relative;border:2px solid #e8d0f0;animation:popIn .35s cubic-bezier(.34,1.56,.64,1)}
.modal-close{position:absolute;top:1rem;right:1.2rem;background:none;border:none;font-size:1.5rem;cursor:pointer;color:#c0a0d0;font-weight:700;line-height:1}
.modal-close:hover{color:#9060b0}
.modal-title{font-size:1.3rem;font-weight:800;color:var(--text);margin-bottom:1rem;text-align:center}
.postiboo-writer{position:absolute;top:-52px;right:2rem;font-size:2.8rem;animation:float 2.5s ease-in-out infinite;pointer-events:none;user-select:none;z-index:5}

/* Mood grid */
.mood-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:1.2rem}
.mood-btn{display:flex;flex-direction:column;align-items:center;gap:.2rem;padding:.5rem .3rem;border-radius:14px;border:2px solid transparent;background:var(--lavender);cursor:pointer;font-family:var(--font);font-size:1.4rem;transition:transform .15s,border-color .15s,background .15s}
.mood-btn span{font-size:.65rem;font-weight:700;color:var(--text-soft);line-height:1}
.mood-btn:hover{transform:scale(1.08)}
.mood-btn.selected{border-color:#c090e0;background:var(--pink);transform:scale(1.1);box-shadow:0 4px 12px rgba(200,150,220,.3)}

/* Text area */
.note-prompt{margin-bottom:1rem}
.prompt-text{font-size:.9rem;font-weight:700;color:#b080d0;margin-bottom:.5rem}
#noteText{width:100%;height:110px;border:2px solid #e8d0f0;border-radius:14px;padding:.8rem;font-family:var(--font);font-size:.95rem;color:var(--text);resize:none;outline:none;transition:border-color .2s;background:#fdfaff}
#noteText:focus{border-color:#c090e0}
#noteText::placeholder{color:#d0b8e8}
.char-count{text-align:right;font-size:.75rem;color:#c0a8d8;margin-top:.3rem}

/* Response type */
.response-type{margin-bottom:1.2rem}
.section-label{font-size:.85rem;font-weight:700;color:var(--text-soft);margin-bottom:.5rem}
.response-options{display:flex;flex-wrap:wrap;gap:.4rem}
.resp-opt{background:#f8f0ff;border:2px solid #e0caf8;border-radius:50px;padding:.3rem .8rem;font-size:.8rem;font-weight:600;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:.3rem;transition:background .15s,border-color .15s}
.resp-opt:has(input:checked){background:var(--lavender);border-color:#c090e0}
.resp-opt input{display:none}

/* Modal footer */
.modal-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.5rem}
.anon-toggle{font-size:.85rem;font-weight:600;color:var(--text-soft);display:flex;align-items:center;gap:.4rem;cursor:pointer}
.anon-toggle input{accent-color:#c090e0}
.btn-drop{background:linear-gradient(135deg,#f48fb1,#ce93d8);border:none;color:white;padding:.65rem 1.6rem;border-radius:50px;font-family:var(--font);font-weight:800;font-size:1rem;cursor:pointer;box-shadow:0 4px 14px rgba(240,100,160,.35);transition:transform .15s,box-shadow .15s}
.btn-drop:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 6px 20px rgba(240,100,160,.45)}

/* Filter bar */
.filter-bar{max-width:1100px;margin:1rem auto 0;padding:0 1.5rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.filter-label{font-size:.85rem;font-weight:700;color:var(--text-soft)}
.filter-btn{background:white;border:2px solid #e8d8f0;border-radius:50px;padding:.3rem .85rem;font-family:var(--font);font-size:.8rem;font-weight:700;color:var(--text-soft);cursor:pointer;transition:all .15s}
.filter-btn:hover{border-color:#c090e0;color:var(--text)}
.filter-btn.active{background:var(--lavender);border-color:#c090e0;color:var(--text)}

/* Corkboard */
.corkboard{max-width:1100px;margin:1.2rem auto 3rem;padding:1.5rem;background:var(--cork);border-radius:24px;border:3px solid var(--cork-dark);min-height:480px;position:relative;background-image:radial-gradient(circle at 20% 30%,rgba(255,255,255,.25) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(210,180,140,.3) 0%,transparent 50%);display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.2rem;align-content:start}

/* Post-it note */
.note-card{position:relative;border-radius:var(--radius-note);padding:1.1rem 1rem 1.5rem;min-height:170px;box-shadow:3px 4px 12px rgba(0,0,0,.13),0 1px 3px rgba(0,0,0,.08);transform:rotate(var(--rot,0deg));transition:transform .2s,box-shadow .2s;cursor:pointer;display:flex;flex-direction:column;gap:.5rem;animation:dropIn .4s cubic-bezier(.34,1.56,.64,1)}
.note-card::before{content:'';position:absolute;top:0;left:0;right:0;height:28px;background:rgba(255,255,255,.28);border-radius:var(--radius-note) var(--radius-note) 0 0}
.note-card::after{content:'';position:absolute;bottom:0;right:0;width:22px;height:22px;background:rgba(0,0,0,.06);clip-path:polygon(100% 0,100% 100%,0 100%);border-radius:0 0 var(--radius-note) 0}
.note-card:hover{transform:rotate(0deg) scale(1.03) translateY(-4px);box-shadow:5px 8px 22px rgba(0,0,0,.18);z-index:10}
.note-card.hidden{display:none}
.note-mood-emoji{font-size:1.6rem;line-height:1}
.note-text{font-size:.88rem;font-weight:600;color:#4a3a5a;line-height:1.5;flex:1;word-break:break-word}
.note-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.note-author{font-size:.72rem;font-weight:700;color:rgba(80,60,100,.5)}
.note-reactions{display:flex;gap:.3rem}
.reaction-sticker{font-size:1.1rem;cursor:pointer;transition:transform .15s;line-height:1}
.reaction-sticker:hover{transform:scale(1.3)}
.note-pin{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ff9ea0,#e05060);box-shadow:0 2px 4px rgba(0,0,0,.25);z-index:2}
.note-community{font-size:.72rem;color:rgba(80,60,100,.6);font-weight:600;font-style:italic;margin-top:.25rem}

/* Posti-boo on main board */
.postiboo-main{position:absolute;bottom:1.5rem;right:2rem;pointer-events:none;user-select:none;z-index:20;filter:drop-shadow(2px 3px 4px rgba(0,0,0,.12));animation:walk 8s linear infinite}

/* Toast */
.win-toast{position:fixed;bottom:-100px;left:50%;transform:translateX(-50%);background:white;border:2px solid var(--mint);border-radius:50px;padding:.7rem 1.5rem;display:flex;align-items:center;gap:.6rem;font-weight:700;font-size:.95rem;color:#407060;box-shadow:0 6px 24px rgba(0,0,0,.12);transition:bottom .5s cubic-bezier(.34,1.56,.64,1);z-index:300;white-space:nowrap}
.win-toast.show{bottom:2rem}
.win-icon{font-size:1.4rem;animation:bounce .6s ease-in-out infinite alternate}

/* Confetti */
.confetti-piece{position:fixed;pointer-events:none;z-index:400;animation:confettiFall 1.2s ease-in forwards}

/* Animations */
@keyframes wiggle{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
@keyframes float{0%,100%{transform:translateY(0px) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}
@keyframes hug-bounce{0%{transform:scale(1) rotate(-5deg)}100%{transform:scale(1.12) rotate(5deg)}}
@keyframes popIn{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes dropIn{0%{transform:translateY(-40px) rotate(var(--rot,0deg));opacity:0}100%{transform:translateY(0) rotate(var(--rot,0deg));opacity:1}}
@keyframes bounce{0%{transform:translateY(0)}100%{transform:translateY(-5px)}}
@keyframes walk{0%{transform:translateX(0) scaleX(1)}45%{transform:translateX(-280px) scaleX(1)}50%{transform:translateX(-280px) scaleX(-1)}95%{transform:translateX(0) scaleX(-1)}100%{transform:translateX(0) scaleX(1)}}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(320px) rotate(720deg)}}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#e0c8f0;border-radius:10px}
@media(max-width:600px){
  .site-header{padding:1rem}
  .logo-text{font-size:1.4rem}
  .tagline{display:none}
  .corkboard{padding:1rem;gap:.8rem}
  .mood-grid{grid-template-columns:repeat(3,1fr)}
  .modal-card{padding:1.5rem 1.2rem}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">🌈</span>
      <span class="logo-text">Post-itopia</span>
    </div>
    <p class="tagline">Tu rinconcito emocional pastel.</p>
    <div class="header-actions">
      <button class="btn-hug" id="hugBtn"><span class="hug-bear">🐻</span> Hug Button</button>
      <button class="btn-new" id="newNoteBtn">+ Nueva notita</button>
    </div>
  </div>
</header>

<div class="hug-overlay" id="hugOverlay">
  <div class="hug-card">
    <span class="hug-bear-big">🐻</span>
    <p>Un abrazo gigante para ti 💛</p>
    <span class="hug-close" id="hugClose">×</span>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card">
    <button class="modal-close" id="modalClose">×</button>
    <div class="postiboo-writer" id="postibooWriter"></div>
    <h2 class="modal-title">¿Cómo te sientes hoy?</h2>
    <div class="mood-grid" id="moodGrid">
      <button class="mood-btn" data-mood="calm">😌<span>Calm</span></button>
      <button class="mood-btn" data-mood="sad">😔<span>Sad</span></button>
      <button class="mood-btn" data-mood="overwhelmed">😵<span>Overwhelmed</span></button>
      <button class="mood-btn" data-mood="angry">😡<span>Angry</span></button>
      <button class="mood-btn" data-mood="confused">😕<span>Confused</span></button>
      <button class="mood-btn" data-mood="lonely">🤍<span>Lonely</span></button>
      <button class="mood-btn" data-mood="anxious">🧿<span>Anxious</span></button>
      <button class="mood-btn" data-mood="grateful">✨<span>Grateful</span></button>
      <button class="mood-btn" data-mood="motivated">🔥<span>Motivated</span></button>
      <button class="mood-btn" data-mood="drained">🌧️<span>Drained</span></button>
      <button class="mood-btn" data-mood="hopeful">🌈<span>Hopeful</span></button>
    </div>
    <div class="note-prompt">
      <p class="prompt-text" id="promptText">Cuéntale a tu notita qué pasó… 💛</p>
      <textarea id="noteText" placeholder="Escribe aquí, este es tu espacio seguro…" maxlength="280"></textarea>
      <div class="char-count"><span id="charCount">0</span>/280</div>
    </div>
    <div class="response-type">
      <p class="section-label">¿Qué tipo de compañía quieres?</p>
      <div class="response-options">
        <label class="resp-opt"><input type="radio" name="respType" value="apoyo" checked/> 💞 Solo apoyo</label>
        <label class="resp-opt"><input type="radio" name="respType" value="consejos"/> 🌱 Consejos suaves</label>
        <label class="resp-opt"><input type="radio" name="respType" value="historias"/> 🫂 Historias similares</label>
        <label class="resp-opt"><input type="radio" name="respType" value="humor"/> 🌸 Humor cute</label>
        <label class="resp-opt"><input type="radio" name="respType" value="stickers"/> 🐥 Solo stickers</label>
      </div>
    </div>
    <div class="modal-footer">
      <label class="anon-toggle"><input type="checkbox" id="anonCheck"/> Anónima 🫧</label>
      <button class="btn-drop" id="dropBtn">Drop it ✨</button>
    </div>
  </div>
</div>

<div class="filter-bar">
  <span class="filter-label">Ver:</span>
  <button class="filter-btn active" data-filter="all">Todas ✨</button>
  <button class="filter-btn" data-filter="sad">😔 Sad</button>
  <button class="filter-btn" data-filter="calm">😌 Calm</button>
  <button class="filter-btn" data-filter="hopeful">🌈 Hopeful</button>
  <button class="filter-btn" data-filter="grateful">✨ Grateful</button>
  <button class="filter-btn" data-filter="anxious">🧿 Anxious</button>
  <button class="filter-btn" data-filter="motivated">🔥 Motivated</button>
</div>

<main class="corkboard" id="corkboard">
  <div class="postiboo-main" id="postibooMain"></div>
</main>

<div class="win-toast" id="winToast">
  <span class="win-icon">🐥</span>
  <span class="win-text">¡Lo estás haciendo bien! 🌟</span>
</div>

<script>
const MOOD_COLORS={calm:'#c8f0dc',sad:'#b3c6e8',overwhelmed:'#e8c3e8',angry:'#f4b8b8',confused:'#ffd9a8',lonely:'#dce8f0',anxious:'#c9d4f0',grateful:'#fff0b8',motivated:'#ffe0b8',drained:'#cfd8dc',hopeful:'#b8eaf4'};
const MOOD_EMOJIS={calm:'😌',sad:'😔',overwhelmed:'😵',angry:'😡',confused:'😕',lonely:'🤍',anxious:'🧿',grateful:'✨',motivated:'🔥',drained:'🌧️',hopeful:'🌈'};
const PROMPTS={sad:'¿Qué te apachurró el corazón hoy? 💙',calm:'Qué bien que estés tranqui… ¿qué te dio paz hoy? 🌿',overwhelmed:'Respira. Cuéntale a tu notita qué te tiene así 💜',angry:'¿Qué te hizo enojar? Aquí puedes soltarlo todo 🔴',confused:'¿Qué te tiene con la cabeza hecha bola? 🌀',lonely:'No estás sola/solo. Cuéntame qué sientes 🤍',anxious:'Respira suavito. ¿Qué te está preocupando? 🫧',grateful:'¡Qué bonito! ¿Qué te hizo sonreír hoy? ✨',motivated:'¡Eso! ¿Qué te está llenando de energía? 🔥',drained:'Está bien descansar. ¿Qué te dejó sin pilas? 🌧️',hopeful:'Se siente bien tener esperanza 🌈 ¿Qué la generó?'};
const COMMUNITY={apoyo:['🐻 Estoy contigo','☁️ Respira conmigo','🐥 Yo también pasé por eso','⭐ Lo estás haciendo bien'],consejos:['🌱 Un paso a la vez','🫧 Habla con alguien de confianza','🌸 Date un momento para ti','✨ Está bien pedir ayuda'],historias:['🫂 Una vez yo también…','💜 Pasé algo similar','🌈 Salí adelante, tú puedes','🐣 No eres la única'],humor:['🐸 Miau (apoyo incondicional)','✨ Tu notita te manda papitas','🌟 Error 404: tristeza no encontrada','🍰 ¿Y si nos comemos un pastel?'],stickers:['💛','🌸','⭐','🫂']};
const ROTS=[-3,-1.5,0,1.5,2.5,-2,1,-1,3,-2.5];
const SAD_MOODS=['sad','overwhelmed','lonely','anxious','drained'];

const POSTIBOO=`<svg width="56" height="62" viewBox="0 0 56 62" xmlns="http://www.w3.org/2000/svg">
<ellipse cx="8" cy="34" rx="9" ry="6" fill="#fde68a" opacity=".85"/>
<ellipse cx="48" cy="34" rx="9" ry="6" fill="#fde68a" opacity=".85"/>
<rect x="10" y="12" width="36" height="36" rx="10" fill="#fef08a"/>
<rect x="10" y="12" width="36" height="36" rx="10" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
<polygon points="38,12 46,12 46,20" fill="#fde047"/>
<line x1="38" y1="12" x2="46" y2="20" stroke="#fbbf24" stroke-width="1"/>
<ellipse cx="21" cy="32" rx="4.5" ry="5" fill="white"/>
<ellipse cx="35" cy="32" rx="4.5" ry="5" fill="white"/>
<circle cx="22" cy="32" r="2.5" fill="#3b2a4a"/>
<circle cx="36" cy="32" r="2.5" fill="#3b2a4a"/>
<circle cx="23" cy="31" r="1" fill="white"/>
<circle cx="37" cy="31" r="1" fill="white"/>
<ellipse cx="17" cy="38" rx="4" ry="2.5" fill="#fda4af" opacity=".6"/>
<ellipse cx="39" cy="38" rx="4" ry="2.5" fill="#fda4af" opacity=".6"/>
<path d="M23 41 Q28 45 33 41" stroke="#a16207" stroke-width="1.5" fill="none" stroke-linecap="round"/>
<line x1="28" y1="12" x2="28" y2="6" stroke="#fbbf24" stroke-width="1.5"/>
<circle cx="28" cy="5" r="2.5" fill="#f472b6"/>
</svg>`;

const POSTIBOO_SAD=`<svg width="56" height="62" viewBox="0 0 56 62" xmlns="http://www.w3.org/2000/svg">
<ellipse cx="8" cy="38" rx="7" ry="4" fill="#fde68a" opacity=".7"/>
<ellipse cx="48" cy="38" rx="7" ry="4" fill="#fde68a" opacity=".7"/>
<rect x="10" y="12" width="36" height="36" rx="10" fill="#fef08a"/>
<rect x="10" y="12" width="36" height="36" rx="10" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
<polygon points="38,12 46,12 46,20" fill="#fde047"/>
<line x1="38" y1="12" x2="46" y2="20" stroke="#fbbf24" stroke-width="1"/>
<ellipse cx="21" cy="33" rx="4" ry="4.5" fill="white"/>
<ellipse cx="35" cy="33" rx="4" ry="4.5" fill="white"/>
<circle cx="22" cy="34" r="2.5" fill="#3b2a4a"/>
<circle cx="36" cy="34" r="2.5" fill="#3b2a4a"/>
<ellipse cx="17" cy="38" rx="4" ry="2.5" fill="#93c5fd" opacity=".5"/>
<ellipse cx="39" cy="38" rx="4" ry="2.5" fill="#93c5fd" opacity=".5"/>
<path d="M23 43 Q28 40 33 43" stroke="#a16207" stroke-width="1.5" fill="none" stroke-linecap="round"/>
<line x1="28" y1="12" x2="28" y2="6" stroke="#fbbf24" stroke-width="1.5"/>
<circle cx="28" cy="5" r="2.5" fill="#93c5fd"/>
</svg>`;

let selectedMood=null;
let notes=[];

function isSad(m){return SAD_MOODS.includes(m)}

function init(){
  document.getElementById('postibooMain').innerHTML=POSTIBOO;
  document.getElementById('postibooWriter').innerHTML=POSTIBOO;
  loadSeeds();
  renderNotes();
  bindEvents();
}

function bindEvents(){
  document.getElementById('newNoteBtn').onclick=openModal;
  document.getElementById('modalClose').onclick=closeModal;
  document.getElementById('modalOverlay').onclick=e=>{if(e.target===document.getElementById('modalOverlay'))closeModal()};
  document.getElementById('hugBtn').onclick=()=>document.getElementById('hugOverlay').classList.add('active');
  document.getElementById('hugClose').onclick=()=>document.getElementById('hugOverlay').classList.remove('active');
  document.getElementById('hugOverlay').onclick=e=>{if(e.target===document.getElementById('hugOverlay'))document.getElementById('hugOverlay').classList.remove('active')};
  document.getElementById('noteText').oninput=function(){document.getElementById('charCount').textContent=this.value.length};
  document.getElementById('dropBtn').onclick=dropNote;
  document.querySelectorAll('.mood-btn').forEach(btn=>{
    btn.onclick=()=>{
      document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedMood=btn.dataset.mood;
      document.getElementById('promptText').textContent=PROMPTS[selectedMood]||'Cuéntale a tu notita qué pasó… 💛';
      document.getElementById('postibooWriter').innerHTML=isSad(selectedMood)?POSTIBOO_SAD:POSTIBOO;
    };
  });
  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.onclick=()=>{
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      filterNotes(btn.dataset.filter);
    };
  });
}

function openModal(){document.getElementById('modalOverlay').classList.add('active');document.getElementById('noteText').focus()}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active');resetModal()}
function resetModal(){
  selectedMood=null;
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('noteText').value='';
  document.getElementById('charCount').textContent='0';
  document.getElementById('promptText').textContent='Cuéntale a tu notita qué pasó… 💛';
  document.getElementById('anonCheck').checked=false;
  document.querySelector('input[name="respType"][value="apoyo"]').checked=true;
  document.getElementById('postibooWriter').innerHTML=POSTIBOO;
}

function dropNote(){
  const text=document.getElementById('noteText').value.trim();
  if(!text&&!selectedMood){document.getElementById('noteText').focus();return}
  const anon=document.getElementById('anonCheck').checked;
  const respType=document.querySelector('input[name="respType"]:checked').value;
  const mood=selectedMood||'calm';
  const responses=COMMUNITY[respType]||COMMUNITY.apoyo;
  const note={id:Date.now(),mood,text:text||'…',color:MOOD_COLORS[mood],emoji:MOOD_EMOJIS[mood],author:anon?'Anónima 🫧':'Tú 💛',responses:responses.slice(0,2+Math.floor(Math.random()*3)),rot:ROTS[notes.length%ROTS.length]};
  notes.unshift(note);
  closeModal();
  renderNotes();
  if(!isSad(mood)){setTimeout(showWinToast,600);setTimeout(launchConfetti,700)}
}

function renderNotes(){
  const board=document.getElementById('corkboard');
  const pbb=document.getElementById('postibooMain');
  board.innerHTML='';
  board.appendChild(pbb);
  notes.forEach(n=>board.appendChild(createNoteEl(n)));
}

function createNoteEl(note){
  const div=document.createElement('div');
  div.className='note-card';
  div.dataset.mood=note.mood;
  div.style.setProperty('--rot',note.rot+'deg');
  div.style.background=note.color;

  const pin=document.createElement('div');pin.className='note-pin';
  const emoji=document.createElement('div');emoji.className='note-mood-emoji';emoji.textContent=note.emoji;
  const text=document.createElement('p');text.className='note-text';text.textContent=note.text;

  const communityResp=note.responses.find(r=>r.length>3);
  if(communityResp){
    const c=document.createElement('div');c.className='note-community';c.textContent=communityResp;
    div.appendChild(pin);div.appendChild(emoji);div.appendChild(text);div.appendChild(c);
  } else {
    div.appendChild(pin);div.appendChild(emoji);div.appendChild(text);
  }

  const footer=document.createElement('div');footer.className='note-footer';
  const author=document.createElement('span');author.className='note-author';author.textContent=note.author;
  const reactions=document.createElement('div');reactions.className='note-reactions';
  note.responses.slice(0,3).forEach(r=>{
    const s=document.createElement('span');s.className='reaction-sticker';
    const m=r.match(/^\p{Emoji}/u);
    s.textContent=m?m[0]:'💛';
    s.title=r;
    s.onclick=e=>{e.stopPropagation();s.style.transform='scale(1.6)';setTimeout(()=>s.style.transform='',300)};
    reactions.appendChild(s);
  });
  footer.appendChild(author);footer.appendChild(reactions);
  div.appendChild(footer);
  return div;
}

function filterNotes(filter){
  document.querySelectorAll('.note-card').forEach(card=>{
    if(filter==='all'||card.dataset.mood===filter)card.classList.remove('hidden');
    else card.classList.add('hidden');
  });
}

function showWinToast(){
  const opts=[{i:'🐥',t:'¡Lo estás haciendo bien! 🌟'},{i:'⭐',t:'¡Pequeña victoria celebrada! ✨'},{i:'🌈',t:'¡Tu notita llegó al corcho! 💛'},{i:'🌸',t:'¡Eso es! ¡Sigue así, campeona! 🎉'}];
  const o=opts[Math.floor(Math.random()*opts.length)];
  const toast=document.getElementById('winToast');
  toast.querySelector('.win-icon').textContent=o.i;
  toast.querySelector('.win-text').textContent=o.t;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),3000);
}

function launchConfetti(){
  const cols=['#f9c8d8','#fff3b8','#c8e4f8','#e2d4f8','#c8f0dc','#ffd8c0'];
  for(let i=0;i<28;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.left=(20+Math.random()*60)+'vw';
    p.style.top=(Math.random()*30)+'vh';
    p.style.background=cols[Math.floor(Math.random()*cols.length)];
    const size=(6+Math.random()*8)+'px';
    p.style.width=size;p.style.height=size;
    p.style.borderRadius=Math.random()>.5?'50%':'2px';
    p.style.animationDelay=(Math.random()*.5)+'s';
    p.style.animationDuration=(.9+Math.random()*.8)+'s';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),2000);
  }
}
